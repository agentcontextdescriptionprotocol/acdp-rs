name: bindings

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'Cargo.toml'
      - 'bindings/**'
      - '.github/workflows/bindings.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'Cargo.toml'
      - 'bindings/**'
      - '.github/workflows/bindings.yml'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  acdp-py:
    name: acdp-py (python ${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ['3.9', '3.11', '3.13']
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          # Standalone [workspace] in each binding's Cargo.toml, so a
          # separate cache key keeps the bindings' target/ dirs from
          # competing with the root crate's.
          workspaces: bindings/acdp-py
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
      # `maturin develop` requires an active venv/conda env — it refuses
      # to install into the bare hosted-tool Python. Create one and
      # promote it into PATH + VIRTUAL_ENV for every subsequent step.
      - name: Create and activate venv
        run: |
          python -m venv .venv
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"
          echo "VIRTUAL_ENV=$PWD/.venv" >> "$GITHUB_ENV"
      - name: Install maturin + pytest
        run: |
          python -m pip install --upgrade pip
          python -m pip install 'maturin>=1.5,<2.0' pytest
      - name: Build the wheel (editable)
        working-directory: bindings/acdp-py
        run: maturin develop --release
      - name: pytest
        working-directory: bindings/acdp-py
        run: pytest tests/ -v

  acdp-node:
    name: acdp-node (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 18 (Maintenance LTS through 2025-04), 20 (LTS), 22 (LTS) —
        # 22 catches `node --test tests/` regressions where bare dir
        # paths started failing with MODULE_NOT_FOUND.
        node: ['18', '20', '22']
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: bindings/acdp-node
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - name: Install @napi-rs/cli
        working-directory: bindings/acdp-node
        run: npm install
      - name: Build the native binary
        working-directory: bindings/acdp-node
        run: npm run build:debug
      - name: node --test
        working-directory: bindings/acdp-node
        # Explicit glob: Node 22+ treats `--test tests/` as a module
        # path (MODULE_NOT_FOUND) instead of recursing into the dir.
        run: node --test tests/*.mjs

  interop:
    name: interop (python ↔ node)
    runs-on: ubuntu-latest
    needs: [acdp-py, acdp-node]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            bindings/acdp-py
            bindings/acdp-node
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      # `maturin develop` requires an active venv — see acdp-py job.
      - name: Create and activate venv
        run: |
          python -m venv .venv
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"
          echo "VIRTUAL_ENV=$PWD/.venv" >> "$GITHUB_ENV"
      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install 'maturin>=1.5,<2.0' pytest
      - name: Build the Python SDK (editable)
        working-directory: bindings/acdp-py
        run: maturin develop --release
      - name: Build the Node.js SDK
        working-directory: bindings/acdp-node
        run: |
          npm install
          npm run build:debug
      - name: Cross-language interop pytest
        working-directory: bindings/interop
        run: pytest test_interop.py -v
