# cargo-deny configuration. See https://embarkstudios.github.io/cargo-deny/

[graph]
all-features = true

[advisories]
version = 2
yanked   = "deny"
ignore   = []

[licenses]
version    = 2
confidence-threshold = 0.93
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Zlib",
  "Unicode-3.0",
  "Unicode-DFS-2016",
  "MPL-2.0",
  "CC0-1.0",
  "BSL-1.0",
  "0BSD",
  "CDLA-Permissive-2.0",
]

[bans]
multiple-versions = "warn"
wildcards         = "warn"

[sources]
unknown-registry = "deny"
unknown-git      = "deny"
allow-registry   = ["https://github.com/rust-lang/crates.io-index"]
