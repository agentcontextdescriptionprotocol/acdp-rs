# cargo-deny configuration. See https://embarkstudios.github.io/cargo-deny/

[graph]
all-features = true

[advisories]
version = 2
yanked   = "deny"
ignore = [
  # rustls-pemfile is "unmaintained" (RUSTSEC-2025-0134) — its PEM
  # parsing was folded back into rustls upstream. The only ACDP code
  # path that pulls it in is `axum-server` v0.7, used in our
  # tests/common TLS harness (dev-dependency only). It never ships to
  # crates.io consumers of `acdp`. Revisit once `axum-server` releases
  # a version that uses rustls' built-in PEM helpers.
  { id = "RUSTSEC-2025-0134", reason = "transitive dev-dep via axum-server; unmaintained ≠ vulnerable" },
]

[licenses]
version    = 2
confidence-threshold = 0.93
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Zlib",
  "Unicode-3.0",
  "Unicode-DFS-2016",
  "MPL-2.0",
  "CC0-1.0",
  "BSL-1.0",
  "0BSD",
  "CDLA-Permissive-2.0",
]

[bans]
multiple-versions = "warn"
wildcards         = "warn"

[sources]
unknown-registry = "deny"
unknown-git      = "deny"
allow-registry   = ["https://github.com/rust-lang/crates.io-index"]
